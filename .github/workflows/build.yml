name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-client:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (x86 Client)
        run: >
          cmake --preset x86-release -B build-x86-client

      - name: Build
        run: cmake --build build-x86-client --config RelWithDebInfo

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xash3d-windows-x86
          path: build-x86-client/engine/*

  windows-dedicated:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (x86 Dedicated)
        run: >
          cmake --preset x86-dedicated -B build-x86-dedicated

      - name: Build
        run: cmake --build build-x86-dedicated --config RelWithDebInfo

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xash-dedicated-windows-x86
          path: build-x86-dedicated/engine/*

  linux-client:
    runs-on: ubuntu-latest
    container:
      image: i386/ubuntu:24.04
      options: --user root
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq git cmake ninja-build g++ libsdl2-dev libfontconfig-dev
          git submodule update --init --recursive

      - name: Configure (Linux 32-bit Client)
        run: >
          cmake --preset linux-release -B build-linux-client -G Ninja

      - name: Build
        run: cmake --build build-linux-client --config RelWithDebInfo

      - name: Build
        run: cmake --build build-linux-client --config RelWithDebInfo

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xash3d-linux-x86
          path: build-linux-client/engine/*

  linux-dedicated:
    runs-on: ubuntu-latest
    container:
      image: i386/ubuntu:24.04
      options: --user root
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq git cmake ninja-build g++
          git submodule update --init --recursive

      - name: Configure (Linux 32-bit Dedicated)
        run: >
          cmake --preset linux-dedicated -B build-linux-dedicated -G Ninja

      - name: Build
        run: cmake --build build-linux-dedicated --config RelWithDebInfo

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xash-dedicated-linux-x86
          path: build-linux-dedicated/engine/*

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for TAB characters
        run: |
          ! grep -rnP '\t' engine/ --include='*.c' --include='*.cpp' --include='*.h' || echo "Tabs found"

  android-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build with Gradle
        working-directory: engine/android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xash3d-android-arm64
          path: engine/android/app/build/outputs/apk/debug/*.apk
