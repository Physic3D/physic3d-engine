name: Build & Package

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x64]
        config: [RelWithDebInfo]
        include:
          - arch: x86
            cmake_arch: x86
            msvc_arch: x86
          - arch: x64
            cmake_arch: x64
            msvc_arch: amd64

    runs-on: windows-2022

    env:
      ENGINE_BUILD_DIR: ${{ github.workspace }}\out\build\engine
      HLSDK_BUILD_DIR: ${{ github.workspace }}\out\build\hlsdk
      DIST_DIR: ${{ github.workspace }}\out\dist

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - uses: seanmiddleditch/gha-setup-ninja@v5

      - run: pip install ninja
        if: failure()

      - name: Build & Package
        shell: pwsh
        run: |
          python scripts/package.py --arch ${{ matrix.arch }} --config ${{ matrix.config }}

      - uses: actions/upload-artifact@v4
        with:
          name: physic3d-windows-${{ matrix.arch }}-${{ matrix.config }}
          path: ${{ env.DIST_DIR }}\physic3d-${{ matrix.arch }}-${{ matrix.config }}.zip

  build-linux:
    strategy:
      fail-fast: false
      matrix:
        arch: [x64]
        config: [RelWithDebInfo]

    runs-on: ubuntu-22.04

    env:
      ENGINE_BUILD_DIR: ${{ github.workspace }}/out/build/engine
      HLSDK_BUILD_DIR: ${{ github.workspace }}/out/build/hlsdk
      DIST_DIR: ${{ github.workspace }}/out/dist

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake g++ \
            libsdl2-dev libfontconfig-dev libfreetype6-dev \
            libx11-dev libxext-dev

      - name: Build & Package
        run: |
          python3 scripts/package.py --arch ${{ matrix.arch }} --config ${{ matrix.config }}

      - uses: actions/upload-artifact@v4
        with:
          name: physic3d-linux-${{ matrix.arch }}-${{ matrix.config }}
          path: ${{ env.DIST_DIR }}/physic3d-${{ matrix.arch }}-${{ matrix.config }}.zip
