name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  windows-client:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (x86 Client)
        run: >
          cmake --preset x86-release -B build-x86-client

      - name: Build
        run: cmake --build build-x86-client --config RelWithDebInfo

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xash3d-windows-x86
          path: build-x86-client/engine/xash_sdl.dll

  windows-dedicated:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (x86 Dedicated)
        run: >
          cmake --preset x86-dedicated -B build-x86-dedicated

      - name: Build
        run: cmake --build build-x86-dedicated --config RelWithDebInfo

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xash-dedicated-windows-x86
          path: build-x86-dedicated/engine/xash_dedicated.exe

  linux-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build libsdl2-dev libfontconfig-dev

      - name: Configure (Linux Client)
        run: >
          cmake --preset linux-release -B build-linux-client -G "Ninja"

      - name: Build
        run: cmake --build build-linux-client --config RelWithDebInfo

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xash3d-linux
          path: build-linux-client/engine/xash3d

  linux-dedicated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build

      - name: Configure (Linux Dedicated)
        run: >
          cmake --preset linux-dedicated -B build-linux-dedicated -G "Ninja"

      - name: Build
        run: cmake --build build-linux-dedicated --config RelWithDebInfo

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xash-dedicated-linux
          path: build-linux-dedicated/engine/xash3d

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for TAB characters
        run: |
          ! grep -rnP '\t' engine/ --include='*.c' --include='*.cpp' --include='*.h' || echo "Tabs found"
